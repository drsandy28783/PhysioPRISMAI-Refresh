[pytest]
# Playwright Test Configuration
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Playwright options
addopts =
    --verbose
    --headed
    --browser chromium
    --slowmo 500
    --screenshot only-on-failure
    --video retain-on-failure
    --tracing retain-on-failure

# Test markers
markers =
    basic: Basic functionality tests (login, navigation, etc.)
    workflow: Full clinical workflow tests
    smoke: Quick smoke tests
    slow: Tests that take longer to run
