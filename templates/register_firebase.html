<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Physiologic PRISM</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Hide navbar on registration page */
        body > .navbar { display: none !important; }
        .container { max-width: 450px; margin: 60px auto; }
        .error-message {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: none;
        }
        .success-message {
            background-color: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: none;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }
        .divider:before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }
        .divider span {
            background: white;
            padding: 0 16px;
            position: relative;
            color: #666;
            font-size: 14px;
        }
        .google-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            color: #444;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .google-btn:hover {
            background: #f8f8f8;
            border-color: #ccc;
        }
        .google-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .google-icon {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Individual Physiotherapist Registration</h2>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <!-- Google Sign-Up Button -->
        <button type="button" id="google-signup-btn" class="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign up with Google
        </button>

        <div class="divider">
            <span>OR</span>
        </div>

        <form id="register-form">
            <div class="field-block">
                <input class="input-field" type="text" id="name" name="name" placeholder="Full Name" required>
            </div>

            <div class="field-block">
                <input class="input-field" type="email" id="email" name="email" placeholder="Email" required>
            </div>

            <div class="field-block">
                <input class="input-field" type="text" id="phone" name="phone" placeholder="Phone Number" required>
            </div>

            <div class="field-block">
                <input class="input-field" type="password" id="password" name="password" placeholder="Password (min 8 characters)" required minlength="8">
            </div>

            <!-- GDPR Consent Section -->
            <div style="margin-top: 24px; padding: 16px; background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px;">
                <h3 style="margin-top: 0; font-size: 16px;">Data Processing Consent (Required)</h3>

                <div style="margin-bottom: 12px;">
                    <label style="display: flex; align-items: start; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="consent_data_processing" name="consent_data_processing" required style="margin-top: 4px;">
                        <span style="font-size: 14px;">
                            I consent to the processing of my personal data as described in the
                            <a href="{{ url_for('privacy_policy') }}" target="_blank" style="color: #3498db;">Privacy Policy</a>.
                            This includes storing my account information, patient records, and usage logs.
                        </span>
                    </label>
                </div>

                <div style="margin-bottom: 12px;">
                    <label style="display: flex; align-items: start; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="consent_terms" name="consent_terms" required style="margin-top: 4px;">
                        <span style="font-size: 14px;">
                            I agree to the <a href="{{ url_for('terms_of_service') }}" target="_blank" style="color: #3498db;">Terms of Service</a>
                            and confirm that I am a licensed healthcare professional.
                        </span>
                    </label>
                </div>

                <div style="margin-bottom: 0;">
                    <label style="display: flex; align-items: start; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="consent_ai" name="consent_ai" style="margin-top: 4px;">
                        <span style="font-size: 14px;">
                            <strong>(Optional)</strong> I consent to anonymized patient data being sent to OpenAI for AI-powered suggestions.
                            If unchecked, AI features will be disabled for your account.
                        </span>
                    </label>
                </div>
            </div>

            <div style="margin-top:24px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
                <button type="submit" class="button" id="register-button">Register</button>
                <a href="{{ url_for('login') }}" class="button" style="background:#ccc; color:#000;">Already registered? Login</a>
            </div>
        </form>
    </div>

    <!-- Firebase Initialization -->
    <script type="module" nonce="{{ csp_nonce() }}">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAI2QaNaJuA6cV_KSJlgsyus11-GKzxee8",
            authDomain: "physiologicprism-474610.firebaseapp.com",
            projectId: "physiologicprism-474610",
            storageBucket: "physiologicprism-474610.firebasestorage.app",
            messagingSenderId: "292385113403",
            appId: "1:292385113403:web:02abf02787ba4e02cba31e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.__FIREBASE_APP__ = app;
        window.__FIREBASE_AUTH__ = auth;
    </script>

    <!-- Registration Logic -->
    <script type="module" nonce="{{ csp_nonce() }}">
        import { register, signInWithGoogle, syncUserToFirestore } from '{{ url_for("static", filename="auth.js") }}';

        const registerForm = document.getElementById('register-form');
        const registerButton = document.getElementById('register-button');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }

        function hideMessages() {
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
        }

        // Handle registration form submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            // Get form values
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const consentDataProcessing = document.getElementById('consent_data_processing').checked;
            const consentTerms = document.getElementById('consent_terms').checked;
            const consentAi = document.getElementById('consent_ai').checked;

            // Validate inputs
            if (!name || !email || !phone || !password) {
                showError('Please fill in all required fields');
                return;
            }

            if (!consentDataProcessing || !consentTerms) {
                showError('You must accept the required consents to register');
                return;
            }

            // Show loading state
            registerButton.textContent = 'Creating account...';
            registerButton.disabled = true;
            registerForm.classList.add('loading');

            try {
                // Step 1: Create Firebase Auth account
                const authResult = await register(email, password, { name });

                if (!authResult.success) {
                    showError(authResult.error);
                    return;
                }

                registerButton.textContent = 'Syncing user data...';

                // Step 2: Sync user data to Firestore
                const userData = {
                    name,
                    email,
                    phone,
                    institute: 'Individual',  // Individual practitioner
                    consent_data_processing: consentDataProcessing,
                    consent_terms: consentTerms,
                    consent_ai: consentAi,
                    is_admin: 0,  // Regular user
                    is_super_admin: 0,
                    approved: 0,  // Pending approval
                    active: 1
                };

                const syncResult = await syncUserToFirestore(authResult.user, userData);

                if (!syncResult.success) {
                    showError('Account created but data sync failed: ' + syncResult.error);
                    // Still show partial success
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                    return;
                }

                // Success!
                showSuccess('Registration successful! Your account is pending admin approval. Redirecting to login...');

                // Sign out and redirect to login
                await window.__FIREBASE_AUTH__.signOut();

                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                showError('An unexpected error occurred. Please try again.');
            } finally {
                registerButton.textContent = 'Register';
                registerButton.disabled = false;
                registerForm.classList.remove('loading');
            }
        });

        // Handle Google Sign-Up
        const googleSignUpBtn = document.getElementById('google-signup-btn');
        googleSignUpBtn.addEventListener('click', async () => {
            hideMessages();

            // Show loading state
            googleSignUpBtn.disabled = true;
            googleSignUpBtn.textContent = 'Signing up with Google...';

            try {
                // Sign in with Google (this handles both new users and existing users)
                const result = await signInWithGoogle();

                if (!result.success) {
                    showError(result.error);
                    return;
                }

                // If this is a new user, we need to sync their data
                if (result.isNewUser) {
                    googleSignUpBtn.textContent = 'Creating your account...';

                    // For Google sign-up, we'll use default consent values
                    // Users will need to provide additional info later
                    const userData = {
                        name: result.user.displayName || 'Google User',
                        email: result.user.email,
                        phone: '',  // Will need to be collected later
                        institute: 'Individual',
                        consent_data_processing: true,  // Implied by using Google
                        consent_terms: true,  // Implied by using Google
                        consent_ai: true,  // Default to enabled
                        is_admin: 0,
                        is_super_admin: 0,
                        approved: 0,  // Pending approval
                        active: 1
                    };

                    const syncResult = await syncUserToFirestore(result.user, userData);

                    if (!syncResult.success) {
                        showError('Account created but data sync failed: ' + syncResult.error);
                        await window.__FIREBASE_AUTH__.signOut();
                        return;
                    }

                    showSuccess('Registration successful! Your account is pending admin approval. Redirecting...');

                    // Sign out and redirect to login
                    await window.__FIREBASE_AUTH__.signOut();

                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    // Existing user - redirect to login
                    showSuccess('Account already exists. Redirecting to login...');
                    await window.__FIREBASE_AUTH__.signOut();

                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                }

            } catch (error) {
                console.error('Google sign-up error:', error);
                showError('An unexpected error occurred. Please try again.');
            } finally {
                googleSignUpBtn.disabled = false;
                googleSignUpBtn.innerHTML = '<svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Sign up with Google';
            }
        });
    </script>
</body>
</html>
