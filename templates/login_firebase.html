<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Physiologic PRISM</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Hide navbar on login page */
        body > .navbar { display: none !important; }
        .container { max-width: 400px; margin: 80px auto; }
        .error-message {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: none;
        }
        .success-message {
            background-color: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: none;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }
        .divider:before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }
        .divider span {
            background: white;
            padding: 0 16px;
            position: relative;
            color: #666;
            font-size: 14px;
        }
        .google-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            color: #444;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .google-btn:hover {
            background: #f8f8f8;
            border-color: #ccc;
        }
        .google-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .google-icon {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Individual Physiotherapist Login</h2>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <!-- Google Sign-In Button -->
        <button type="button" id="google-signin-btn" class="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>

        <div class="divider">
            <span>OR</span>
        </div>

        <form id="login-form">
            <div class="field-block">
                <input class="input-field" type="email" id="email" name="email" placeholder="Email" required>
            </div>

            <div class="field-block">
                <input class="input-field" type="password" id="password" name="password" placeholder="Password" required minlength="8">
            </div>

            <div style="margin-top:24px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
                <button type="submit" class="button" id="login-button">Login</button>
                <a href="{{ url_for('register') }}" class="button" style="background:#ccc; color:#000;">Not registered? Sign up</a>
            </div>

            <div style="margin-top:16px;">
                <a href="#" id="forgot-password" style="color:#3498db; font-size:14px;">Forgot password?</a>
            </div>
        </form>
    </div>

    <!-- Firebase Initialization -->
    <script type="module" nonce="{{ csp_nonce() }}">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAI2QaNaJuA6cV_KSJlgsyus11-GKzxee8",
            authDomain: "physiologicprism-474610.firebaseapp.com",
            projectId: "physiologicprism-474610",
            storageBucket: "physiologicprism-474610.firebasestorage.app",
            messagingSenderId: "292385113403",
            appId: "1:292385113403:web:02abf02787ba4e02cba31e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.__FIREBASE_APP__ = app;
        window.__FIREBASE_AUTH__ = auth;
    </script>

    <!-- Login Logic -->
    <script type="module" nonce="{{ csp_nonce() }}">
        import { signIn, signInWithGoogle, resetPassword, waitForAuth, startTokenRefresh } from '{{ url_for("static", filename="auth.js") }}';

        const loginForm = document.getElementById('login-form');
        const loginButton = document.getElementById('login-button');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');
        const forgotPasswordLink = document.getElementById('forgot-password');

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }

        function hideMessages() {
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
        }

        // Check if already signed in
        waitForAuth().then(async user => {
            if (user) {
                console.log('User already signed in with Firebase, verifying session...');

                // Clear any stale error messages from previous sessions
                hideMessages();

                // Show loading message
                successDiv.textContent = 'Already logged in, redirecting...';
                successDiv.style.display = 'block';
                loginButton.disabled = true;

                // Verify backend session is valid
                try {
                    const idToken = await user.getIdToken();
                    const response = await fetch('/api/verify-login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${idToken}`
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const redirectUrl = data.redirect || '/dashboard';
                        console.log('Session verified, redirecting to:', redirectUrl);
                        window.location.href = redirectUrl;
                    } else {
                        // Session not valid, show login form
                        console.log('Session verification failed, showing login form');
                        hideMessages();
                        loginButton.disabled = false;
                    }
                } catch (error) {
                    console.error('Error verifying session:', error);
                    // Show login form on error
                    hideMessages();
                    loginButton.disabled = false;
                }
            }
        });

        // Handle login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Validate inputs
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            // Show loading state
            loginButton.textContent = 'Signing in...';
            loginButton.disabled = true;
            loginForm.classList.add('loading');

            try {
                // Sign in with Firebase Auth
                const result = await signIn(email, password);

                if (!result.success) {
                    showError(result.error);
                    return;
                }

                // Success! Start token refresh
                startTokenRefresh();

                // Get ID token
                const idToken = await result.user.getIdToken();

                // Verify with backend (check approval status, etc.)
                const response = await fetch('/api/verify-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({
                        email: email
                    })
                });

                if (!response.ok) {
                    const error = await response.json();

                    // Check for ToS update required
                    if (error.error === 'TOS_UPDATE_REQUIRED') {
                        showError('Terms of Service have been updated. Redirecting...');
                        setTimeout(() => {
                            window.location.href = error.redirect || '/accept-updated-tos';
                        }, 1500);
                        return;
                    }

                    // Check for email not verified
                    if (error.error === 'EMAIL_NOT_VERIFIED') {
                        showError(error.message || 'Please verify your email address first');
                        await window.__FIREBASE_AUTH__.signOut();
                        return;
                    }

                    showError(error.error || 'Login verification failed');

                    // Sign out from Firebase if backend rejects
                    await window.__FIREBASE_AUTH__.signOut();
                    return;
                }

                const data = await response.json();

                // Check approval status (backend should handle this, but double-check)
                if (data.user && data.user.approved !== 1) {
                    showError('Your account is pending admin approval');
                    await window.__FIREBASE_AUTH__.signOut();
                    return;
                }

                if (data.user && data.user.active !== 1) {
                    showError('Your account has been deactivated');
                    await window.__FIREBASE_AUTH__.signOut();
                    return;
                }

                // Success - redirect to appropriate dashboard based on role
                const redirectUrl = data.redirect || '/dashboard';
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showError('An unexpected error occurred. Please try again.');
            } finally {
                loginButton.textContent = 'Login';
                loginButton.disabled = false;
                loginForm.classList.remove('loading');
            }
        });

        // Handle forgot password
        forgotPasswordLink.addEventListener('click', async (e) => {
            e.preventDefault();
            hideMessages();

            const email = document.getElementById('email').value.trim();

            if (!email) {
                showError('Please enter your email address first');
                return;
            }

            if (!confirm(`Send password reset email to ${email}?`)) {
                return;
            }

            const result = await resetPassword(email);

            if (result.success) {
                showSuccess('Password reset email sent! Check your inbox.');
            } else {
                showError(result.error);
            }
        });

        // Handle Google Sign-In
        const googleSignInBtn = document.getElementById('google-signin-btn');
        googleSignInBtn.addEventListener('click', async () => {
            hideMessages();

            // Show loading state
            googleSignInBtn.disabled = true;
            googleSignInBtn.textContent = 'Signing in with Google...';

            try {
                // Sign in with Google
                const result = await signInWithGoogle();

                if (!result.success) {
                    showError(result.error);
                    return;
                }

                // Success! Start token refresh
                startTokenRefresh();

                // Get ID token
                const idToken = await result.user.getIdToken();

                // Verify with backend
                const response = await fetch('/api/verify-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({
                        email: result.user.email,
                        name: result.user.displayName,
                        isNewUser: result.isNewUser
                    })
                });

                if (!response.ok) {
                    const error = await response.json();

                    // Check for ToS update required
                    if (error.error === 'TOS_UPDATE_REQUIRED') {
                        showError('Terms of Service have been updated. Redirecting...');
                        setTimeout(() => {
                            window.location.href = error.redirect || '/accept-updated-tos';
                        }, 1500);
                        return;
                    }

                    showError(error.error || 'Login verification failed');

                    // Sign out from Firebase if backend rejects
                    await window.__FIREBASE_AUTH__.signOut();
                    return;
                }

                const data = await response.json();

                // Check approval status
                if (data.user && data.user.approved !== 1) {
                    showError('Your account is pending admin approval');
                    await window.__FIREBASE_AUTH__.signOut();
                    return;
                }

                if (data.user && data.user.active !== 1) {
                    showError('Your account has been deactivated');
                    await window.__FIREBASE_AUTH__.signOut();
                    return;
                }

                // Success - redirect
                const redirectUrl = data.redirect || '/dashboard';
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1000);

            } catch (error) {
                console.error('Google sign-in error:', error);
                showError('An unexpected error occurred. Please try again.');
            } finally {
                googleSignInBtn.disabled = false;
                googleSignInBtn.innerHTML = '<svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Sign in with Google';
            }
        });
    </script>
</body>
</html>
